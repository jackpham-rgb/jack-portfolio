<svg viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg" font-family="'Libre Franklin', 'Georgia', sans-serif">
  <defs>
    <marker id="arr4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4C8DFF"/>
    </marker>
    <marker id="arr4w" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#78DCE8"/>
    </marker>
  </defs>

  <rect width="900" height="440" fill="#0A1220" rx="12"/>
  <text x="450" y="34" text-anchor="middle" fill="#F5F8FC" font-size="15" font-weight="600" letter-spacing="0.04em">ACOUSTIC POSITIONING SYSTEM</text>
  <line x1="100" y1="42" x2="800" y2="42" stroke="#1E2C42" stroke-width="1"/>

  <!-- Panel labels -->
  <text x="170" y="62" text-anchor="middle" fill="#7F8EA3" font-size="9" font-weight="600">A. ROOM GEOMETRY</text>
  <text x="510" y="62" text-anchor="middle" fill="#7F8EA3" font-size="9" font-weight="600">B. SIGNAL TIMING / CROSS-CORRELATION</text>
  <text x="800" y="62" text-anchor="middle" fill="#7F8EA3" font-size="9" font-weight="600">C. LOCALIZATION</text>

  <!-- ═══════════ PANEL A: Room ═══════════ -->
  <rect x="20" y="70" width="300" height="280" rx="8" fill="#0E1728" stroke="#1E2C42" stroke-width="1"/>

  <!-- room floor outline -->
  <rect x="42" y="88" width="256" height="244" rx="4" fill="#111C30" stroke="#1E2C42" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Speaker A — top-left -->
  <rect x="52" y="94" width="28" height="22" rx="4" fill="#1E2C42"/>
  <text x="66" y="109" text-anchor="middle" fill="#4C8DFF" font-size="10" font-weight="700">S₁</text>
  <!-- range arc -->
  <circle cx="66" cy="105" r="50"  fill="none" stroke="#4C8DFF" stroke-width="1" stroke-dasharray="3,4" opacity="0.4"/>
  <circle cx="66" cy="105" r="80"  fill="none" stroke="#4C8DFF" stroke-width="1" stroke-dasharray="3,6" opacity="0.2"/>

  <!-- Speaker B — top-right -->
  <rect x="258" y="94" width="28" height="22" rx="4" fill="#1E2C42"/>
  <text x="272" y="109" text-anchor="middle" fill="#78DCE8" font-size="10" font-weight="700">S₂</text>
  <!-- range arc -->
  <circle cx="272" cy="105" r="60"  fill="none" stroke="#78DCE8" stroke-width="1" stroke-dasharray="3,4" opacity="0.4"/>
  <circle cx="272" cy="105" r="95"  fill="none" stroke="#78DCE8" stroke-width="1" stroke-dasharray="3,6" opacity="0.2"/>

  <!-- Speaker C — bottom center -->
  <rect x="154" y="290" width="28" height="22" rx="4" fill="#1E2C42"/>
  <text x="168" y="305" text-anchor="middle" fill="#A8B6C9" font-size="10" font-weight="700">S₃</text>
  <!-- range arc -->
  <circle cx="168" cy="301" r="55"  fill="none" stroke="#A8B6C9" stroke-width="1" stroke-dasharray="3,4" opacity="0.4"/>
  <circle cx="168" cy="301" r="85"  fill="none" stroke="#A8B6C9" stroke-width="1" stroke-dasharray="3,6" opacity="0.2"/>

  <!-- Microphone — unknown position -->
  <circle cx="185" cy="185" r="10" fill="#F5F8FC" opacity="0.95"/>
  <text x="185" y="189" text-anchor="middle" fill="#0A1220" font-size="8" font-weight="700">M</text>
  <text x="200" y="178" fill="#F5F8FC" font-size="8">? unknown</text>

  <!-- Lines from speakers to mic -->
  <line x1="80"  y1="116" x2="178" y2="180" stroke="#4C8DFF" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="118" y="148" fill="#4C8DFF" font-size="8">d₁</text>
  <line x1="258" y1="116" x2="193" y2="180" stroke="#78DCE8" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="236" y="148" fill="#78DCE8" font-size="8">d₂</text>
  <line x1="168" y1="290" x2="185" y2="197" stroke="#A8B6C9" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="173" y="248" fill="#A8B6C9" font-size="8">d₃</text>

  <!-- Intersection point label -->
  <text x="170" y="352" text-anchor="middle" fill="#7F8EA3" font-size="8">Circles intersect at estimated position</text>

  <!-- ═══════════ PANEL B: Timing ═══════════ -->
  <rect x="334" y="70" width="356" height="280" rx="8" fill="#0E1728" stroke="#1E2C42" stroke-width="1"/>

  <!-- Transmitted signal -->
  <text x="512" y="92" text-anchor="middle" fill="#A8B6C9" font-size="10" font-weight="600">Transmitted beacon</text>
  <line x1="350" y1="132" x2="676" y2="132" stroke="#1E2C42" stroke-width="1"/>
  <line x1="350" y1="108" x2="350" y2="136" stroke="#1E2C42" stroke-width="1"/>
  <text x="344" y="142" fill="#7F8EA3" font-size="7">t=0</text>
  <polyline points="360,132 370,108 380,132 390,132 400,108 410,132 420,132" fill="none" stroke="#4C8DFF" stroke-width="1.8"/>
  <text x="512" y="152" text-anchor="middle" fill="#7F8EA3" font-size="8">x(t)</text>

  <!-- Received signal (delayed) -->
  <text x="512" y="176" text-anchor="middle" fill="#A8B6C9" font-size="10" font-weight="600">Received at microphone</text>
  <line x1="350" y1="214" x2="676" y2="214" stroke="#1E2C42" stroke-width="1"/>
  <line x1="350" y1="190" x2="350" y2="218" stroke="#1E2C42" stroke-width="1"/>
  <polyline points="420,214 430,190 440,214 450,214 460,190 470,214 480,214" fill="none" stroke="#78DCE8" stroke-width="1.8"/>
  <!-- delay arrow -->
  <line x1="390" y1="204" x2="430" y2="204" stroke="#F5F8FC" stroke-width="1" marker-end="url(#arr4)"/>
  <line x1="390" y1="204" x2="350" y2="204" stroke="#F5F8FC" stroke-width="1" marker-end="url(#arr4w)"/>
  <text x="390" y="198" text-anchor="middle" fill="#F5F8FC" font-size="8">Δt</text>
  <text x="512" y="234" text-anchor="middle" fill="#7F8EA3" font-size="8">y(t) = x(t - Δt) + noise</text>

  <!-- Cross-correlation graph -->
  <text x="512" y="258" text-anchor="middle" fill="#A8B6C9" font-size="10" font-weight="600">Cross-correlation R(τ)</text>
  <line x1="350" y1="296" x2="676" y2="296" stroke="#1E2C42" stroke-width="1"/>
  <line x1="350" y1="268" x2="350" y2="300" stroke="#1E2C42" stroke-width="1"/>
  <!-- correlation curve — peak at delay -->
  <polyline points="352,294 370,292 390,286 410,278 430,260 448,274 460,290 480,294 510,294 550,294 600,294 650,294" fill="none" stroke="#4C8DFF" stroke-width="1.6"/>
  <!-- peak marker -->
  <line x1="430" y1="258" x2="430" y2="296" stroke="#F5F8FC" stroke-width="1.2" stroke-dasharray="3,2"/>
  <circle cx="430" cy="260" r="4" fill="#78DCE8"/>
  <text x="438" y="258" fill="#78DCE8" font-size="8">peak = Δt</text>
  <text x="512" y="316" text-anchor="middle" fill="#7F8EA3" font-size="8">R(τ) = Σ x(n) · y(n+τ)</text>
  <text x="512" y="328" text-anchor="middle" fill="#7F8EA3" font-size="7">Peak location gives the time delay Δt</text>

  <!-- ═══════════ PANEL C: Localization ═══════════ -->
  <rect x="704" y="70" width="176" height="280" rx="8" fill="#0E1728" stroke="#1E2C42" stroke-width="1"/>

  <text x="792" y="92" text-anchor="middle" fill="#A8B6C9" font-size="10" font-weight="600">Step 1: Distance</text>
  <rect x="716" y="98" width="152" height="36" rx="4" fill="#111C30"/>
  <text x="792" y="113" text-anchor="middle" fill="#78DCE8" font-size="12" font-weight="600" font-family="'DM Mono',monospace">d = v · Δt</text>
  <text x="792" y="126" text-anchor="middle" fill="#7F8EA3" font-size="8">v = speed of sound ≈ 343 m/s</text>

  <line x1="716" y1="144" x2="868" y2="144" stroke="#1E2C42" stroke-width="1"/>

  <text x="792" y="162" text-anchor="middle" fill="#A8B6C9" font-size="10" font-weight="600">Step 2: Circles</text>
  <text x="792" y="178" text-anchor="middle" fill="#7F8EA3" font-size="8">Each beacon gives one</text>
  <text x="792" y="190" text-anchor="middle" fill="#7F8EA3" font-size="8">circle of possible positions</text>
  <!-- mini circles diagram -->
  <circle cx="792" cy="220" r="28" fill="none" stroke="#4C8DFF"  stroke-width="1.2" stroke-dasharray="3,3" opacity="0.6"/>
  <circle cx="792" cy="220" r="20" fill="none" stroke="#78DCE8"  stroke-width="1.2" stroke-dasharray="3,3" opacity="0.6"/>
  <circle cx="792" cy="220" r="36" fill="none" stroke="#A8B6C9"  stroke-width="1.2" stroke-dasharray="3,3" opacity="0.6"/>
  <circle cx="792" cy="220" r="3"  fill="#78DCE8"/>

  <line x1="716" y1="248" x2="868" y2="248" stroke="#1E2C42" stroke-width="1"/>

  <text x="792" y="266" text-anchor="middle" fill="#A8B6C9" font-size="10" font-weight="600">Step 3: Least Squares</text>
  <text x="792" y="282" text-anchor="middle" fill="#7F8EA3" font-size="8">3+ beacons overdetermine</text>
  <text x="792" y="294" text-anchor="middle" fill="#7F8EA3" font-size="8">the system. Solve with</text>
  <text x="792" y="306" text-anchor="middle" fill="#78DCE8" font-size="9" font-weight="600" font-family="'DM Mono',monospace">Ax = b  →  x̂ = A⁺b</text>
  <text x="792" y="322" text-anchor="middle" fill="#7F8EA3" font-size="8">minimum error estimate</text>
  <text x="792" y="340" text-anchor="middle" fill="#4C8DFF" font-size="9" font-weight="600">→ position x̂</text>

  <!-- Bottom insight -->
  <rect x="20" y="364" width="860" height="52" rx="6" fill="#0E1728" stroke="#1E2C42" stroke-width="1"/>
  <text x="24" y="382" fill="#7F8EA3" font-size="9" font-weight="600">KEY INSIGHT:</text>
  <text x="24" y="398" fill="#7F8EA3" font-size="9">Signal processing can sense physical space. Cross-correlation converts signal delay into distance. Geometry converts distances into position.</text>
  <text x="24" y="410" fill="#7F8EA3" font-size="9">Signals become a tool for measurement, not just classification.</text>
</svg>
