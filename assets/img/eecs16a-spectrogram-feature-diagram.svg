<svg viewBox="0 0 860 360" xmlns="http://www.w3.org/2000/svg"
  font-family="'Libre Franklin','Franklin Gothic',Arial,sans-serif">
  <defs>
    <marker id="a2" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0.5 L5,3 L0,5.5" fill="none" stroke="#666" stroke-width="1"/>
    </marker>
  </defs>
  <rect width="860" height="360" fill="#F7F5F0"/>
  <line x1="28" y1="18" x2="832" y2="18" stroke="#121212" stroke-width="1.5"/>
  <text x="430" y="40" text-anchor="middle" font-family="'Playfair Display','Georgia',serif"
    font-size="13" font-weight="700" fill="#121212" letter-spacing="0.04em">FROM WAVEFORM TO FINGERPRINT</text>
  <line x1="28" y1="50" x2="832" y2="50" stroke="#E2E2E2" stroke-width="0.75"/>

  <!-- ── Panel 1: Waveform ── -->
  <rect x="28" y="62" width="232" height="160" fill="#FFF" stroke="#E2E2E2" stroke-width="0.75"/>
  <line x1="28" y1="62" x2="260" y2="62" stroke="#326891" stroke-width="2"/>
  <text x="144" y="82" text-anchor="middle" font-size="9" font-weight="600" fill="#121212" letter-spacing="0.07em">1. WAVEFORM</text>
  <text x="144" y="94" text-anchor="middle" font-size="8" fill="#666">time domain · amplitude vs time</text>

  <!-- waveform -->
  <line x1="44"  y1="168" x2="244" y2="168" stroke="#E2E2E2" stroke-width="0.75"/>
  <line x1="44"  y1="102" x2="44"  y2="170" stroke="#E2E2E2" stroke-width="0.75"/>
  <text x="144" y="182" text-anchor="middle" font-size="7.5" fill="#999">time →</text>
  <text x="36"  y="135" text-anchor="middle" font-size="7.5" fill="#999" transform="rotate(-90,36,135)">amp</text>
  <polyline points="46,168 56,152 66,136 76,120 86,136 96,152 106,168 116,152 126,128 136,108 146,128 156,152 166,168 176,152 186,138 196,148 206,158 216,168 226,162 236,168 244,168"
    fill="none" stroke="#326891" stroke-width="1.4"/>

  <text x="144" y="210" text-anchor="middle" font-size="8.5" fill="#666">Time structure preserved.</text>
  <text x="144" y="222" text-anchor="middle" font-size="8.5" fill="#666">Frequency info is hidden.</text>

  <!-- arrow 1→2 -->
  <line x1="260" y1="142" x2="278" y2="142" stroke="#666" stroke-width="0.8" marker-end="url(#a2)"/>
  <text x="269" y="132" text-anchor="middle" font-size="7.5" fill="#666">STFT</text>

  <!-- ── Panel 2: Spectrogram ── -->
  <rect x="280" y="62" width="270" height="160" fill="#FFF" stroke="#E2E2E2" stroke-width="0.75"/>
  <line x1="280" y1="62" x2="550" y2="62" stroke="#326891" stroke-width="2"/>
  <text x="415" y="82" text-anchor="middle" font-size="9" font-weight="600" fill="#121212" letter-spacing="0.07em">2. SPECTROGRAM</text>
  <text x="415" y="94" text-anchor="middle" font-size="8" fill="#666">time-frequency · energy per window</text>

  <!-- heatmap grid 7 cols × 5 rows, cell 30×22 -->
  <!-- row 1 (high freq) -->
  <rect x="302" y="102" width="30" height="20" rx="1" fill="#E8E4DC"/><rect x="334" y="102" width="30" height="20" rx="1" fill="#C8C0B0"/><rect x="366" y="102" width="30" height="20" rx="1" fill="#E8E4DC"/><rect x="398" y="102" width="30" height="20" rx="1" fill="#326891" fill-opacity="0.4"/><rect x="430" y="102" width="30" height="20" rx="1" fill="#C8C0B0"/><rect x="462" y="102" width="30" height="20" rx="1" fill="#E8E4DC"/><rect x="494" y="102" width="30" height="20" rx="1" fill="#E8E4DC"/>
  <!-- row 2 -->
  <rect x="302" y="124" width="30" height="20" rx="1" fill="#C8C0B0"/><rect x="334" y="124" width="30" height="20" rx="1" fill="#326891" fill-opacity="0.6"/><rect x="366" y="124" width="30" height="20" rx="1" fill="#326891" fill-opacity="0.8"/><rect x="398" y="124" width="30" height="20" rx="1" fill="#326891" fill-opacity="0.5"/><rect x="430" y="124" width="30" height="20" rx="1" fill="#326891" fill-opacity="0.7"/><rect x="462" y="124" width="30" height="20" rx="1" fill="#326891" fill-opacity="0.5"/><rect x="494" y="124" width="30" height="20" rx="1" fill="#C8C0B0"/>
  <!-- row 3 (mid-high) -->
  <rect x="302" y="146" width="30" height="20" rx="1" fill="#326891" fill-opacity="0.5"/><rect x="334" y="146" width="30" height="20" rx="1" fill="#326891" fill-opacity="0.4"/><rect x="366" y="146" width="30" height="20" rx="1" fill="#326891" fill-opacity="0.9"/><rect x="398" y="146" width="30" height="20" rx="1" fill="#326891" fill-opacity="0.7"/><rect x="430" y="146" width="30" height="20" rx="1" fill="#326891" fill-opacity="0.5"/><rect x="462" y="146" width="30" height="20" rx="1" fill="#C8C0B0"/><rect x="494" y="146" width="30" height="20" rx="1" fill="#E8E4DC"/>
  <!-- row 4 (mid-low) -->
  <rect x="302" y="168" width="30" height="14" rx="1" fill="#326891" fill-opacity="0.7"/><rect x="334" y="168" width="30" height="14" rx="1" fill="#326891" fill-opacity="0.8"/><rect x="366" y="168" width="30" height="14" rx="1" fill="#326891" fill-opacity="0.6"/><rect x="398" y="168" width="30" height="14" rx="1" fill="#326891" fill-opacity="0.9"/><rect x="430" y="168" width="30" height="14" rx="1" fill="#326891" fill-opacity="0.8"/><rect x="462" y="168" width="30" height="14" rx="1" fill="#326891" fill-opacity="0.6"/><rect x="494" y="168" width="30" height="14" rx="1" fill="#326891" fill-opacity="0.7"/>

  <!-- axes -->
  <line x1="302" y1="184" x2="525" y2="184" stroke="#E2E2E2" stroke-width="0.75"/>
  <line x1="302" y1="100" x2="302" y2="185" stroke="#E2E2E2" stroke-width="0.75"/>
  <text x="414" y="196" text-anchor="middle" font-size="7.5" fill="#999">time →</text>
  <text x="290" y="144" text-anchor="middle" font-size="7.5" fill="#999" transform="rotate(-90,290,144)">freq →</text>

  <!-- colorbar -->
  <defs>
    <linearGradient id="cb" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8E4DC"/>
      <stop offset="100%" stop-color="#326891" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect x="430" y="104" width="88" height="6" fill="url(#cb)" rx="2"/>
  <text x="430" y="116" font-size="7" fill="#999">low</text>
  <text x="518" y="116" text-anchor="end" font-size="7" fill="#999">high energy</text>

  <text x="415" y="210" text-anchor="middle" font-size="8.5" fill="#666">Shows when frequencies occur.</text>
  <text x="415" y="222" text-anchor="middle" font-size="8.5" fill="#666">Basis for Mel spectrogram.</text>

  <!-- arrow 2→3 -->
  <line x1="550" y1="142" x2="568" y2="142" stroke="#666" stroke-width="0.8" marker-end="url(#a2)"/>
  <text x="559" y="132" text-anchor="middle" font-size="7.5" fill="#666">peaks</text>

  <!-- ── Panel 3: Fingerprint ── -->
  <rect x="570" y="62" width="262" height="160" fill="#FFF" stroke="#E2E2E2" stroke-width="0.75"/>
  <line x1="570" y1="62" x2="832" y2="62" stroke="#326891" stroke-width="2"/>
  <text x="701" y="82" text-anchor="middle" font-size="9" font-weight="600" fill="#121212" letter-spacing="0.07em">3. FINGERPRINT</text>
  <text x="701" y="94" text-anchor="middle" font-size="8" fill="#666">compact · robust · matchable</text>

  <!-- mini spectrogram with peaks circled -->
  <rect x="588" y="102" width="18" height="14" rx="1" fill="#E8E4DC"/><rect x="608" y="102" width="18" height="14" rx="1" fill="#C8C0B0"/><rect x="628" y="102" width="18" height="14" rx="1" fill="#326891" fill-opacity="0.5"/><rect x="648" y="102" width="18" height="14" rx="1" fill="#E8E4DC"/>
  <rect x="588" y="118" width="18" height="14" rx="1" fill="#C8C0B0"/><rect x="608" y="118" width="18" height="14" rx="1" fill="#326891" fill-opacity="0.85"/><rect x="628" y="118" width="18" height="14" rx="1" fill="#326891" fill-opacity="0.6"/><rect x="648" y="118" width="18" height="14" rx="1" fill="#326891" fill-opacity="0.8"/>
  <rect x="588" y="134" width="18" height="14" rx="1" fill="#326891" fill-opacity="0.7"/><rect x="608" y="134" width="18" height="14" rx="1" fill="#326891" fill-opacity="0.5"/><rect x="628" y="134" width="18" height="14" rx="1" fill="#326891" fill-opacity="0.9"/><rect x="648" y="134" width="18" height="14" rx="1" fill="#326891" fill-opacity="0.4"/>
  <!-- peak circles -->
  <circle cx="617" cy="125" r="8" fill="none" stroke="#121212" stroke-width="1"/>
  <circle cx="637" cy="141" r="8" fill="none" stroke="#121212" stroke-width="1"/>
  <circle cx="597" cy="141" r="8" fill="none" stroke="#121212" stroke-width="1"/>

  <!-- arrow from peaks to hash table -->
  <line x1="672" y1="130" x2="688" y2="130" stroke="#666" stroke-width="0.8" marker-end="url(#a2)"/>

  <!-- hash pairs -->
  <rect x="690" y="104" width="130" height="16" rx="2" fill="#F7F5F0" stroke="#E2E2E2" stroke-width="0.75"/>
  <text x="698" y="116" font-size="8" fill="#666" font-family="'Courier New',monospace">(t=0.2, f=440 Hz)</text>
  <rect x="690" y="122" width="130" height="16" rx="2" fill="#F7F5F0" stroke="#E2E2E2" stroke-width="0.75"/>
  <text x="698" y="134" font-size="8" fill="#666" font-family="'Courier New',monospace">(t=0.5, f=880 Hz)</text>
  <rect x="690" y="140" width="130" height="16" rx="2" fill="#F7F5F0" stroke="#E2E2E2" stroke-width="0.75"/>
  <text x="698" y="152" font-size="8" fill="#666" font-family="'Courier New',monospace">(t=0.9, f=660 Hz)</text>
  <text x="755" y="170" text-anchor="middle" font-size="8" fill="#999">···</text>

  <text x="701" y="210" text-anchor="middle" font-size="8.5" fill="#666">A 3-min song → a few dozen pairs.</text>
  <text x="701" y="222" text-anchor="middle" font-size="8.5" fill="#666">Robust to noise. Matches in ~1s.</text>

  <!-- ── DFT formula section ── -->
  <line x1="28" y1="244" x2="832" y2="244" stroke="#E2E2E2" stroke-width="0.75"/>

  <rect x="28" y="252" width="380" height="90" fill="#FFF" stroke="#E2E2E2" stroke-width="0.75"/>
  <line x1="28" y1="252" x2="28" y2="342" stroke="#326891" stroke-width="2"/>
  <text x="46" y="272" font-size="9.5" font-weight="600" fill="#121212">The Discrete Fourier Transform</text>
  <text x="46" y="292" font-size="11" fill="#666" font-family="'Courier New',monospace">X(k) = Σ x(n) · e^(−j2πkn/N)</text>
  <text x="46" y="312" font-size="8.5" fill="#999">k = frequency bin,  n = time sample,  N = window length</text>
  <text x="46" y="330" font-size="8.5" fill="#666" font-style="italic">Converts a time window into its frequency content.</text>

  <rect x="420" y="252" width="412" height="90" fill="#FFF" stroke="#E2E2E2" stroke-width="0.75"/>
  <line x1="420" y1="252" x2="420" y2="342" stroke="#326891" stroke-width="2"/>
  <text x="438" y="272" font-size="9.5" font-weight="600" fill="#121212">Real-life: Shazam</text>
  <text x="438" y="292" font-size="8.5" fill="#666">When you hold your phone up to a song, Shazam does not</text>
  <text x="438" y="306" font-size="8.5" fill="#666">compare the full audio. It extracts the strongest spectral</text>
  <text x="438" y="320" font-size="8.5" fill="#666">peaks and matches those pairs against a database of millions.</text>
  <text x="438" y="336" font-size="8.5" fill="#666" font-style="italic">Identity without storing all original data.</text>

  <line x1="28" y1="352" x2="832" y2="352" stroke="#E2E2E2" stroke-width="0.75"/>
</svg>
